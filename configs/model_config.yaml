# Model hyperparameters and training config

random_seed: 42

# FinBERT
finbert:
  base_model: "ProsusAI/finbert"
  max_length: 256
  batch_size: 32
  fine_tune_epochs: 3
  learning_rate: 2e-5

# BERTopic
bertopic:
  min_topic_size: 20
  nr_topics: 50
  embedding_model: "all-MiniLM-L6-v2"

# Temporal Fusion Transformer
tft:
  hidden_size: 128
  max_epochs: 50
  learning_rate: 0.001
  horizon: 20
  context_length: 60
  dropout: 0.1
  num_attention_heads: 4
  num_encoder_layers: 2

# Train/val/test split (by time)
temporal_split:
  train_end: "2021-12-31"
  val_end: "2022-12-31"
  test_start: "2023-01-01"

# Cross-validation
cv:
  n_folds: 4
  method: walk_forward

# XGBoost baseline
xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
